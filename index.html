<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ilévia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, body { font-family: 'Inter', sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    body { background: #f8f9fb; }

    .tab { padding: 7px 8px; border-radius: 8px; font-size: 12px; font-weight: 500; color: #6b7280; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .tab.on { background: white; color: #111; box-shadow: 0 1px 4px rgba(0,0,0,.1); }

    #inp, #inp-velo { background: white; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 10px 14px 10px 40px; width: 100%; font-size: 14px; transition: border-color .15s; }
    #inp:focus, #inp-velo:focus { outline: none; border-color: #6366f1; }

    .card { background: white; border-radius: 12px; border: 1px solid #eaecf0; margin-bottom: 8px; overflow: hidden; }
    .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 11.5px; letter-spacing: .03em; flex-shrink: 0; }
    .heure { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; font-weight: 500; background: #f3f4f6; color: #374151; padding: 2px 7px; border-radius: 5px; }
    .perturb-toggle { font-size: 11.5px; font-weight: 500; color: #b45309; background: #fffbeb; border: 1px solid #fde68a; padding: 2px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .12s; }
    .perturb-toggle:hover { background: #fef3c7; }
    .perturb-panel { display: none; background: #fffdf7; border-top: 1px solid #fde68a; padding: 10px 14px; font-size: 12px; color: #78350f; line-height: 1.55; }
    .perturb-panel.alert { background: #fff5f5; border-top-color: #fca5a5; color: #7f1d1d; }
    .perturb-panel.open { display: block; }
    .sens { font-size: 11.5px; color: #6b7280; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .ligne-row { display: flex; align-items: center; gap: 8px; padding: 7px 14px; border-bottom: 1px solid #f3f4f6; flex-wrap: wrap; }
    .ligne-row:last-child { border-bottom: none; }
    .dist { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #9ca3af; background: #f3f4f6; padding: 1px 6px; border-radius: 4px; }
    .spin { border: 2px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; width: 16px; height: 16px; animation: sp .65s linear infinite; display: inline-block; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .fade { animation: fi .18s ease-out; }
    @keyframes fi { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform:none; } }
    .gps-btn { background: #4f46e5; color: white; border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; width:100%; justify-content:center; }
    .gps-btn:hover { background: #4338ca; }
    .perturb-row { background: white; border-radius: 10px; border: 1px solid #eaecf0; margin-bottom: 6px; overflow: hidden; }
    .perturb-row-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; }
    .perturb-row-body { display: none; padding: 0 14px 10px; font-size: 12px; color: #4b5563; line-height: 1.55; border-top: 1px solid #f3f4f6; }
    .perturb-row-body.open { display: block; }
    .type-info { color: #b45309; background: #fffbeb; border: 1px solid #fde68a; font-size:11px; font-weight:600; padding: 2px 7px; border-radius: 5px; }
    .type-alert { color: #b91c1c; background: #fef2f2; border: 1px solid #fca5a5; font-size:11px; font-weight:600; padding: 2px 7px; border-radius: 5px; }
    .empty { text-align: center; padding: 40px 16px; color: #9ca3af; font-size: 13px; }
    .pmr-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10.5px; font-weight: 600; color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
    .velo-card { background: white; border-radius: 12px; border: 1px solid #eaecf0; margin-bottom: 8px; overflow: hidden; }
    .velo-bar-bg { background: #f3f4f6; border-radius: 4px; height: 5px; flex: 1; overflow: hidden; }
    .velo-bar-fill { height: 100%; border-radius: 4px; background: #22c55e; transition: width .3s; }
    .velo-bar-fill.low { background: #ef4444; }
    .velo-bar-fill.mid { background: #f59e0b; }
    .pill-green { background: #dcfce7; color: #15803d; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
    .pill-dock  { background: #e0f2fe; color: #0369a1; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
    .pill-closed { background: #fee2e2; color: #b91c1c; font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 6px; }
    .velo-search-wrap { position: relative; margin-bottom: 12px; }
    .velo-gps-btn { background: #16a34a; color: white; border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .15s; width:100%; justify-content:center; margin-bottom: 12px; }
    .velo-gps-btn:hover { background: #15803d; }

    /* ── Chrono ── */
    .stn-btn { padding: 9px 4px; border-radius: 8px; border: 1.5px solid #e5e7eb; background: white; color: #111; font-size: 13px; font-weight: 500; font-family: 'JetBrains Mono', monospace; cursor: pointer; text-align: center; transition: all .12s; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .stn-btn:hover { border-color: #9ca3af; background: #f9fafb; }
    .stn-btn.selected { background: #4f46e5; color: #fff; border-color: #4f46e5; }

    .dir-btn { flex: 1; padding: 14px 10px; border-radius: 10px; border: 2px solid #e5e7eb; background: white; font-size: 14px; font-weight: 700; font-family: 'JetBrains Mono', monospace; cursor: pointer; text-align: center; transition: all .15s; }
    .dir-btn:hover { border-color: #6366f1; }
    .dir-btn.sel-dir { border-color: #4f46e5; background: #4f46e5; color: white; }

    .action-btn { width: 100%; padding: 22px; border-radius: 14px; border: none; font-size: 18px; font-weight: 700; cursor: pointer; transition: transform .1s; letter-spacing: .01em; user-select: none; -webkit-user-select: none; }
    .action-btn:active { transform: scale(0.97); }
    .btn-fermer { background: #4f46e5; color: #fff; }
    .btn-fermer:hover { background: #4338ca; }
    .btn-ouvrir { background: #059669; color: #fff; }
    .btn-ouvrir:hover { background: #047857; }
    .btn-secondary { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb !important; font-size: 13px !important; padding: 11px !important; }
    .btn-secondary:hover { background: #e5e7eb; }

    .live-timer { font-family: 'JetBrains Mono', monospace; font-size: 60px; font-weight: 500; text-align: center; line-height: 1; padding: 12px 0 4px; transition: color .2s; }
    .t-trajet { color: #4f46e5; }
    .t-station { color: #d97706; }
    .t-done { color: #059669; }
    .t-idle { color: #d1d5db; }

    .state-label { text-align: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 2px; }
    .sl-trajet { color: #6366f1; }
    .sl-station { color: #d97706; }
    .sl-idle { color: #d1d5db; }
    .sl-done { color: #059669; }

    .ribbon { display: flex; align-items: center; overflow-x: auto; padding: 10px 0 8px; scrollbar-width: none; margin-bottom: 10px; }
    .ribbon::-webkit-scrollbar { display: none; }
    .rb-dot { width: 30px; height: 30px; border-radius: 50%; border: 2.5px solid #e5e7eb; background: white; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 8.5px; font-weight: 700; color: #d1d5db; flex-shrink: 0; transition: all .2s; }
    .rb-dot.rb-past { background: #e0e7ff; border-color: #6366f1; color: #3730a3; }
    .rb-dot.rb-current { background: #4f46e5; border-color: #4f46e5; color: white; width: 36px; height: 36px; font-size: 9px; box-shadow: 0 0 0 4px #e0e7ff; }
    .rb-dot.rb-next { border-color: #a5b4fc; color: #6366f1; }
    .rb-line { width: 14px; height: 3px; background: #e5e7eb; flex-shrink: 0; transition: background .2s; }
    .rb-line.rb-past { background: #6366f1; }

    .log-row { display: grid; grid-template-columns: 1fr auto 60px 60px; gap: 6px; align-items: center; padding: 7px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
    .log-row:last-child { border-bottom: none; }
    .log-head { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; }
    .log-seg { color: #374151; font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; }
    .log-type-t { font-size: 10px; font-weight: 700; color: #4f46e5; background: #ede9fe; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .log-type-s { font-size: 10px; font-weight: 700; color: #92400e; background: #fef3c7; padding: 2px 5px; border-radius: 4px; white-space: nowrap; }
    .log-time { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #111; text-align: right; }
    .log-cum  { font-family: 'JetBrains Mono', monospace; color: #9ca3af; text-align: right; font-size: 11px; }

    .hint-txt { text-align: center; font-size: 12px; color: #9ca3af; margin-bottom: 14px; min-height: 18px; }
    .ml { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .sdiv { border: none; border-top: 1px solid #f3f4f6; margin: 16px 0; }
    .setup-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="max-w-xl mx-auto px-3 pt-4 pb-10">

  <div class="flex gap-1 bg-gray-100 rounded-xl p-1 mb-4 overflow-x-auto">
    <button class="tab on flex-1 text-center" onclick="show('recherche',this)">Arrêts</button>
    <button class="tab flex-1 text-center" onclick="show('proximite',this)">Proximité</button>
    <button class="tab flex-1 text-center" onclick="show('velo',this)">🚲 V'Lille</button>
    <button class="tab flex-1 text-center" onclick="show('chrono',this)">⏱ Chrono</button>
    <button class="tab flex-1 text-center" onclick="show('perturbations',this)">Alertes <span id="pc" class="text-xs mono text-amber-600 ml-0.5"></span></button>
  </div>

  <!-- Arrêts -->
  <div id="s-recherche">
    <div class="relative mb-3">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="inp" type="text" placeholder="Nom d'arrêt, commune…" oninput="search()" autocomplete="off">
    </div>
    <div id="st" class="text-xs text-gray-400 mb-2 h-4 flex items-center gap-2"></div>
    <div id="res"></div>
  </div>

  <!-- Proximité -->
  <div id="s-proximite" style="display:none">
    <button class="gps-btn mb-4" onclick="gps()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      Utiliser ma position GPS
    </button>
    <div id="st-gps" class="text-xs text-gray-400 mb-2 h-4 flex items-center gap-2"></div>
    <div id="res-gps"></div>
  </div>

  <!-- V'Lille -->
  <div id="s-velo" style="display:none">
    <div class="velo-search-wrap">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="inp-velo" type="text" placeholder="Nom de station V'Lille…" oninput="searchVelo()" autocomplete="off">
    </div>
    <button class="velo-gps-btn" onclick="gpsVelo()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
      Stations proches
    </button>
    <div id="st-velo" class="text-xs text-gray-400 mb-2 h-4 flex items-center gap-2"></div>
    <div id="res-velo"></div>
  </div>

  <!-- Chrono -->
  <div id="s-chrono" style="display:none">

    <!-- Setup -->
    <div id="chrono-setup">
      <p class="ml">Station de départ</p>
      <div class="setup-grid" id="grid-dep"></div>
      <div id="dir-wrap" style="display:none">
        <p class="ml">Direction</p>
        <div class="flex gap-3 mb-2">
          <button class="dir-btn" id="dir-4c"  onclick="pickDir('4C')">← 4C</button>
          <button class="dir-btn" id="dir-chu" onclick="pickDir('CHU')">CHU →</button>
        </div>
      </div>
    </div>

    <!-- Session -->
    <div id="chrono-run" style="display:none">
      <div class="ribbon" id="ribbon"></div>
      <div class="state-label sl-idle" id="c-state">Prêt</div>
      <div class="live-timer t-idle" id="c-live">00:00</div>
      <div class="hint-txt" id="c-hint"></div>
      <button class="action-btn btn-fermer" id="c-btn" onclick="cTap()">—</button>
      <div style="height:8px"></div>
      <button class="action-btn btn-secondary" onclick="chronoReset()">↺ Recommencer</button>

      <div id="log-wrap" style="display:none;margin-top:18px">
        <hr class="sdiv" style="margin-top:0">
        <p class="ml">Journal</p>
        <div class="log-row log-head">
          <div>Segment</div><div>Type</div>
          <div style="text-align:right">Durée</div>
          <div style="text-align:right">Cumulé</div>
        </div>
        <div id="c-log"></div>
      </div>
    </div>

  </div>

  <!-- Perturbations -->
  <div id="s-perturbations" style="display:none">
    <div id="st-perturb" class="text-xs text-gray-400 mb-3 h-4 flex items-center gap-2"></div>
    <div id="res-perturb"></div>
  </div>

</div>
<script>
/* ── réseau ── */
let arrets=[],perturbations=[],prochains=[],couleurs={},pmrCodes=new Set(),loaded=false,uid=0;
let veloStations=[],veloStatus={},veloLoaded=false;

async function init(){
  setS('st','<span class="spin"></span>');
  try{
    const[rA,rP,rPa,rC,rPMR]=await Promise.all([
      fetch('https://data.lillemetropole.fr/geoserver/wfs?SERVICE=WFS&REQUEST=GetFeature&VERSION=2.0.0&TYPENAMES=dsp_ilevia%3Alocalisation_point_arret&OUTPUTFORMAT=application%2Fgeo%2Bjson&SRSNAME=EPSG%3A4326'),
      fetch('https://data.lillemetropole.fr/geoserver/ogc/features/v1/collections/dsp_ilevia:perturbations/items?f=application%2Fgeo%2Bjson&limit=10000'),
      fetch('https://data.lillemetropole.fr/geoserver/ogc/features/v1/collections/dsp_ilevia:prochains_passages/items?f=application%2Fgeo%2Bjson&limit=10000'),
      fetch('https://data.lillemetropole.fr/geoserver/ogc/features/v1/collections/dsp_ilevia:couleurs_lignes/items?f=application%2Fgeo%2Bjson&limit=10000'),
      fetch('https://data.lillemetropole.fr/geoserver/wfs?SERVICE=WFS&REQUEST=GetFeature&VERSION=2.0.0&TYPENAMES=dsp_ilevia%3Aaccessibilite_pmr&OUTPUTFORMAT=application%2Fgeo%2Bjson'),
    ]);
    const[dA,dP,dPa,dC,dPMR]=await Promise.all([rA.json(),rP.json(),rPa.json(),rC.json(),rPMR.json()]);
    perturbations=dP.features||[];
    prochains=dPa.features||[];
    (dC.features||[]).forEach(f=>{const p=f.properties;couleurs[p.code_ligne]={bg:'#'+p.couleur_fond_hexadecimal,txt:'#'+p.couleur_texte_hexadecimal};});
    (dPMR.features||[]).forEach(f=>{if(f.properties.code_arret)pmrCodes.add(f.properties.code_arret);});
    const g={};
    (dA.features||[]).forEach(f=>{const p=f.properties;const k=(p.libelle_arret_physique||'').toLowerCase()+'|'+(p.commune||'').toLowerCase();if(!g[k])g[k]={...f,_codes:[]};g[k]._codes.push(p.code_arret_physique);});
    arrets=Object.values(g);loaded=true;setS('st','');
    const n=perturbations.length;if(n)document.getElementById('pc').textContent=n;
    renderPerturb();
  }catch(e){setS('st','Erreur : '+e.message);}
  loadVelo();
}

async function loadVelo(){
  setS('st-velo','<span class="spin"></span>');
  try{
    const[rI,rS]=await Promise.all([fetch('https://media.ilevia.fr/opendata/station_information.json'),fetch('https://media.ilevia.fr/opendata/station_status.json')]);
    const[dI,dS]=await Promise.all([rI.json(),rS.json()]);
    veloStations=dI.data.stations||[];
    (dS.data.stations||[]).forEach(s=>{veloStatus[s.station_id]=s;});
    veloLoaded=true;setS('st-velo',`${veloStations.length} stations V'Lille`);
  }catch(e){setS('st-velo','Erreur V\'Lille');}
}

function setS(id,html){const el=document.getElementById(id);if(el)el.innerHTML=html;}
function show(name,btn){['recherche','proximite','velo','chrono','perturbations'].forEach(s=>document.getElementById('s-'+s).style.display=s===name?'':'none');document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function bdg(code){let c=couleurs[code]||{bg:'#6b7280',txt:'#fff'};if(/^P\d/i.test(code))c={bg:'#4c1d95',txt:'#ede9fe'};return`<span class="badge" style="background:${c.bg};color:${c.txt}">${code}</span>`;}
function getPas(codes){if(!Array.isArray(codes))codes=[codes];return prochains.filter(f=>{const id=f.properties.identifiant_station||'';return codes.some(c=>id.includes(':'+c+':')||id.endsWith(':'+c));});}
function getPerts(code){return perturbations.filter(f=>(f.properties.cible||'').includes('::'+code+':'));}
function isPMR(codes){return codes.some(c=>pmrCodes.has(c));}
function tp(id){const el=document.getElementById(id);if(el)el.classList.toggle('open');}
function hav(lat1,lon1,lat2,lon2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function renderCard(arret,dist){
  const p=arret.properties,codes=arret._codes||[p.code_arret_physique],pas=getPas(codes),byL={};
  pas.forEach(f=>{const pp=f.properties;if(!byL[pp.code_ligne])byL[pp.code_ligne]=[];byL[pp.code_ligne].push(pp);});
  const codesStr=codes.slice(0,2).join(', ')+(codes.length>2?' +'+(codes.length-2):'');
  const distHtml=dist?`<span class="dist">${dist}</span>`:'';
  const pmrHtml=isPMR(codes)?`<span class="pmr-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="4" r="2"/><path d="M10 7h4l1 5h3v2h-4l-1-4H9l-2 9H5l2.5-10A2 2 0 0 1 10 7z"/><path d="M10 16l1 5H9l-1-5z"/></svg>PMR</span>`:'';
  const modeColor={bus:'#6b7280',metro:'#4f46e5',tram:'#0891b2'};
  const mc=modeColor[p.code_mode_transport]||'#6b7280';
  let lignesHtml='';
  if(!Object.keys(byL).length){lignesHtml='<div class="px-4 py-3 text-xs text-gray-400 italic">Aucun passage imminent.</div>';}
  else{for(const[ligne,items]of Object.entries(byL)){
    items.sort((a,b)=>a.heure_estimee_depart.localeCompare(b.heure_estimee_depart));
    const heures=items.map(i=>{const h=new Date(i.heure_estimee_depart).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'});return`<span class="heure">${h}</span>`;}).join('');
    const pts=getPerts(ligne),seen=new Set();
    const ptsUniq=pts.filter(pf=>{const k=pf.properties.message.replace(/<[^>]+>/g,' ').trim().substring(0,80);if(seen.has(k))return false;seen.add(k);return true;});
    const pid='p'+(uid++),pb=ptsUniq.length?`<button class="perturb-toggle ml-auto" onclick="tp('${pid}')">${ptsUniq.length} info${ptsUniq.length>1?'s':''}</button>`:'';
    const isAlert=ptsUniq.some(pf=>pf.properties.type_perturbation==='Perturbation');
    const pc2=ptsUniq.map(pf=>{const msg=pf.properties.message.replace(/<[^>]+>/g,' ').trim();return`<p class="mb-1 last:mb-0">${msg.substring(0,350)}${msg.length>350?'…':''}</p>`;}).join('');
    lignesHtml+=`<div class="ligne-row">${bdg(ligne)}<span class="sens">${items[0].sens_ligne}</span><div class="flex gap-1 flex-wrap">${heures}</div>${pb}</div>${ptsUniq.length?`<div class="perturb-panel${isAlert?' alert':''}" id="${pid}">${pc2}</div>`:''}`;
  }}
  return`<div class="card fade"><div class="flex items-center gap-2 px-4 py-3 border-b border-gray-100"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${mc}" stroke-width="1.8" style="flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><div class="flex-1 min-w-0"><div class="font-semibold text-gray-900 text-sm leading-tight flex items-center gap-2 flex-wrap">${p.libelle_arret_physique} ${pmrHtml}</div><div class="text-xs text-gray-400 mono mt-0.5">${p.commune||''} · ${codesStr}</div></div>${distHtml}</div>${lignesHtml}</div>`;
}

function search(){if(!loaded)return;const q=document.getElementById('inp').value.trim().toLowerCase(),div=document.getElementById('res');if(q.length<2){div.innerHTML='';return;}const m=arrets.filter(f=>{const p=f.properties;return(p.libelle_arret_physique||'').toLowerCase().includes(q)||(p.commune||'').toLowerCase().includes(q)||(p.code_arret_physique||'').toLowerCase().includes(q);}).slice(0,15);div.innerHTML=m.length?m.map(a=>renderCard(a,null)).join(''):'<div class="empty">Aucun arrêt trouvé</div>';}

function gps(){const st=document.getElementById('st-gps'),div=document.getElementById('res-gps');if(!navigator.geolocation){st.textContent='Non disponible';return;}st.innerHTML='<span class="spin"></span> Localisation…';navigator.geolocation.getCurrentPosition(pos=>{const{latitude:lat,longitude:lng}=pos.coords;st.textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;const s=arrets.map(f=>{const p=f.properties;return{f,d:hav(lat,lng,p.latitude,p.longitude)};}).sort((a,b)=>a.d-b.d).slice(0,10);div.innerHTML=s.map(({f,d})=>renderCard(f,Math.round(d)+' m')).join('');},err=>{st.textContent='Erreur : '+err.message;});}

function veloCardHtml(st,dist){
  const status=veloStatus[st.station_id];
  if(!status||!status.is_installed)return`<div class="velo-card fade"><div class="flex items-center gap-3 px-4 py-3"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" style="flex-shrink:0"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5L9 10l-3 1.5"/><path d="M15 6l-3 4h6l-1 4"/></svg><div class="flex-1 min-w-0"><div class="font-semibold text-sm text-gray-900">${st.name}</div><div class="text-xs text-gray-400 mono">${st.post_code||''}</div></div>${dist?`<span class="dist">${dist}</span>`:''}<span class="pill-closed">Fermée</span></div></div>`;
  const bikes=status.num_bikes_available||0,docks=status.num_docks_available||0,total=bikes+docks||1,pct=Math.round(bikes/total*100),barClass=pct<20?'low':pct<50?'mid':'';
  const flags=[];if(!status.is_renting)flags.push('<span class="text-xs text-red-500 font-medium">Location indisponible</span>');if(!status.is_returning)flags.push('<span class="text-xs text-red-500 font-medium">Retour indisponible</span>');
  return`<div class="velo-card fade"><div class="flex items-center gap-3 px-4 py-3 border-b border-gray-100"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" style="flex-shrink:0"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5L9 10l-3 1.5"/><path d="M15 6l-3 4h6l-1 4"/></svg><div class="flex-1 min-w-0"><div class="font-semibold text-sm text-gray-900 leading-tight">${st.name}</div><div class="text-xs text-gray-400 mono">${st.post_code||''} · cap. ${st.capacity}</div></div>${dist?`<span class="dist">${dist}</span>`:''}</div><div class="px-4 py-3"><div class="flex items-center gap-3 mb-2"><span class="pill-green">🚲 ${bikes} vélo${bikes>1?'s':''}</span><span class="pill-dock">🅿 ${docks} place${docks>1?'s':''}</span>${flags.join('')}</div><div class="flex items-center gap-2"><div class="velo-bar-bg"><div class="velo-bar-fill ${barClass}" style="width:${pct}%"></div></div><span class="text-xs mono text-gray-400">${pct}%</span></div></div></div>`;
}

function searchVelo(){if(!veloLoaded)return;const q=document.getElementById('inp-velo').value.trim().toLowerCase(),div=document.getElementById('res-velo');if(q.length<2){div.innerHTML='';return;}const m=veloStations.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.post_code||'').includes(q)).slice(0,20);div.innerHTML=m.length?m.map(s=>veloCardHtml(s,null)).join(''):'<div class="empty">Aucune station trouvée</div>';}

function gpsVelo(){const st=document.getElementById('st-velo'),div=document.getElementById('res-velo');if(!navigator.geolocation){st.textContent='Non disponible';return;}st.innerHTML='<span class="spin"></span> Localisation…';navigator.geolocation.getCurrentPosition(pos=>{const{latitude:lat,longitude:lng}=pos.coords;st.textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;const sorted=veloStations.map(s=>({s,d:hav(lat,lng,s.lat,s.lon)})).sort((a,b)=>a.d-b.d).slice(0,10);div.innerHTML=sorted.map(({s,d})=>veloCardHtml(s,Math.round(d)+' m')).join('');},err=>{st.textContent='Erreur : '+err.message;});}

function renderPerturb(){
  const div=document.getElementById('res-perturb'),st=document.getElementById('st-perturb');
  if(!perturbations.length){st.textContent='0 perturbation';div.innerHTML='<div class="empty">Aucune perturbation en cours</div>';return;}
  const byLigne={};
  perturbations.forEach(f=>{const p=f.properties,cible=(p.cible||'').replace('ILEVIA:LineRef::','').replace(':LOC','');if(!byLigne[cible])byLigne[cible]=[];byLigne[cible].push(p);});
  Object.keys(byLigne).forEach(k=>{const seen=new Set();byLigne[k]=byLigne[k].filter(p=>{const key=p.message.replace(/<[^>]+>/g,' ').trim().substring(0,80);if(seen.has(key))return false;seen.add(key);return true;});});
  const ls=Object.keys(byLigne).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  st.textContent=`${ls.length} ligne${ls.length>1?'s':''} perturbée${ls.length>1?'s':''}`;
  div.innerHTML=ls.map((cible,i)=>{const items=byLigne[cible],isAlert=items.some(p=>p.type_perturbation==='Perturbation'),uid2='pd'+i;const fin=items[0].heure_fin_prevue?new Date(items[0].heure_fin_prevue).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):null;const msgs=items.map(p=>{const msg=p.message.replace(/<[^>]+>/g,' ').trim();return`<p class="mb-2 last:mb-0"><span class="font-medium">${p.type_perturbation}</span> — ${msg.substring(0,500)}${msg.length>500?'…':''}</p>`;}).join('');return`<div class="perturb-row fade"><div class="perturb-row-head" onclick="tp('${uid2}')">${bdg(cible)}<span class="${isAlert?'type-alert':'type-info'}">${isAlert?'Perturbation':'Information'}</span>${fin?`<span class="mono text-xs text-gray-400 ml-auto">${fin}</span>`:''}<svg style="width:14px;height:14px;flex-shrink:0;margin-left:4px" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div><div class="perturb-row-body" id="${uid2}"><div class="pt-2">${msgs}</div></div></div>`;}).join('');
}

/* ════════════════════════════════════════════════
   CHRONO MÉTRO
   États:
     'idle'    → à quai station courante, en attente fermeture portes
     'trajet'  → rame en route entre deux stations
     'station' → portes ouvertes à la station suivante, rame à quai
     'end'     → terminus atteint
════════════════════════════════════════════════ */
const LINE=['4C','CS','TRI','HDV','PDB','SQR','MAH','MRB','FIV','CAU','GLF','RIH','REPU','GAM','WAZ','PDP','OSC','CHU'];
let cDep=null,cDir=null,cIdx=0,cStep=1; // cStep: +1 vers CHU, -1 vers 4C
let cState='idle',cTs=null,cInt=null,cLog=[],cCum=0;

function fmtMs(ms){const t=Math.floor(Math.abs(ms)/1000),m=Math.floor(t/60),s=t%60;return(m<10?'0':'')+m+':'+(s<10?'0':'')+s;}

/* setup grid */
(()=>{
  const el=document.getElementById('grid-dep');
  LINE.forEach(s=>{const b=document.createElement('button');b.className='stn-btn';b.textContent=s;b.onclick=()=>pickDep(s,b);el.appendChild(b);});
})();

function pickDep(val,btn){
  cDep=val;
  document.querySelectorAll('#grid-dep .stn-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('dir-wrap').style.display='';
  document.getElementById('dir-4c').classList.remove('sel-dir');
  document.getElementById('dir-chu').classList.remove('sel-dir');
  cDir=null;
}

function pickDir(dir){
  cDir=dir;
  document.getElementById('dir-4c').classList.toggle('sel-dir',dir==='4C');
  document.getElementById('dir-chu').classList.toggle('sel-dir',dir==='CHU');
  launchSession();
}

function launchSession(){
  cIdx=LINE.indexOf(cDep);
  cStep=cDir==='CHU'?1:-1;
  cState='idle'; cTs=null; cLog=[]; cCum=0;
  clearInterval(cInt);
  document.getElementById('chrono-setup').style.display='none';
  document.getElementById('chrono-run').style.display='';
  document.getElementById('log-wrap').style.display='none';
  document.getElementById('c-log').innerHTML='';
  document.getElementById('c-btn').disabled=false;
  document.getElementById('c-btn').style.opacity='';
  rebuildRibbon();
  refreshUI();
}

/* ── tap ── */
function cTap(){
  const now=Date.now();

  if(cState==='idle'){
    /* portes fermées → début trajet */
    cTs=now; cState='trajet';
    clearInterval(cInt); cInt=setInterval(tickC,100);
    refreshUI();

  }else if(cState==='trajet'){
    /* portes ouvertes → arrivée station suivante */
    const elapsed=now-cTs;
    const fromI=cIdx, toI=cIdx+cStep;
    cLog.push({type:'trajet',from:LINE[fromI],to:LINE[toI],ms:elapsed});
    cCum+=elapsed;
    cIdx=toI;
    cTs=now; cState='station';
    clearInterval(cInt); cInt=setInterval(tickC,100);
    rebuildRibbon();
    refreshLog();
    refreshUI();

  }else if(cState==='station'){
    /* portes fermées → départ vers prochaine station */
    const elapsed=now-cTs;
    cLog.push({type:'station',from:LINE[cIdx],to:LINE[cIdx],ms:elapsed});
    cCum+=elapsed;
    cTs=now;
    const nextI=cIdx+cStep;
    if(nextI<0||nextI>=LINE.length){
      /* terminus */
      cState='end';
      clearInterval(cInt);
      refreshLog();
      refreshUI();
    }else{
      cState='trajet';
      clearInterval(cInt); cInt=setInterval(tickC,100);
      refreshLog();
      refreshUI();
    }
  }
}

function tickC(){
  if(!cTs)return;
  document.getElementById('c-live').textContent=fmtMs(Date.now()-cTs);
}

function refreshUI(){
  const cur=LINE[cIdx];
  const nextI=cIdx+cStep;
  const next=(nextI>=0&&nextI<LINE.length)?LINE[nextI]:null;
  const sl=document.getElementById('c-state');
  const lv=document.getElementById('c-live');
  const ht=document.getElementById('c-hint');
  const btn=document.getElementById('c-btn');

  if(cState==='idle'){
    sl.textContent='Prêt'; sl.className='state-label sl-idle';
    lv.textContent='00:00'; lv.className='live-timer t-idle';
    ht.textContent='Appuie quand les portes se ferment à '+cur;
    btn.textContent='Portes fermées — '+cur;
    btn.className='action-btn btn-fermer';
    btn.disabled=false; btn.style.opacity='';

  }else if(cState==='trajet'){
    sl.textContent='Trajet'; sl.className='state-label sl-trajet';
    lv.className='live-timer t-trajet';
    ht.textContent=cur+(next?' → '+next:'');
    btn.textContent='Portes ouvertes — '+(next||cur);
    btn.className='action-btn btn-ouvrir';
    btn.disabled=false; btn.style.opacity='';

  }else if(cState==='station'){
    sl.textContent='À quai'; sl.className='state-label sl-station';
    lv.className='live-timer t-station';
    ht.textContent='Arrêt à '+cur+(next?' · Prochain : '+next:'');
    btn.textContent='Portes fermées — '+cur;
    btn.className='action-btn btn-fermer';
    btn.disabled=false; btn.style.opacity='';

  }else if(cState==='end'){
    sl.textContent='Terminus !'; sl.className='state-label sl-done';
    lv.textContent=fmtMs(cCum); lv.className='live-timer t-done';
    ht.textContent='Total trajet : '+fmtMs(cCum);
    btn.textContent='✓ Terminus atteint';
    btn.className='action-btn btn-ouvrir';
    btn.disabled=true; btn.style.opacity='.45';
  }
}

/* ribbon */
function rebuildRibbon(){
  const WIN=9;
  let lo=Math.max(0,cIdx-Math.floor(WIN/2));
  let hi=Math.min(LINE.length-1,lo+WIN-1);
  if(hi-lo<WIN-1)lo=Math.max(0,hi-WIN+1);
  const depI=LINE.indexOf(cDep);
  let html='';
  for(let i=lo;i<=hi;i++){
    const isPast=(cStep===1&&i<cIdx&&i>=depI)||(cStep===-1&&i>cIdx&&i<=depI);
    const isCur=i===cIdx, isNext=i===cIdx+cStep;
    const dc=isCur?'rb-dot rb-current':isPast?'rb-dot rb-past':isNext?'rb-dot rb-next':'rb-dot';
    const lc=(cStep===1&&i<cIdx&&i>=depI)||(cStep===-1&&i>cIdx&&i<=depI)?'rb-line rb-past':'rb-line';
    html+=`<div style="display:flex;align-items:center;flex-shrink:0"><div class="${dc}">${LINE[i]}</div></div>`;
    if(i<hi)html+=`<div class="${lc}"></div>`;
  }
  const r=document.getElementById('ribbon');
  r.innerHTML=html;
  const cur=r.querySelector('.rb-current');
  if(cur)cur.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
}

/* log */
function refreshLog(){
  document.getElementById('log-wrap').style.display='';
  let cum=0,html='';
  cLog.forEach(r=>{
    cum+=r.ms;
    const seg=r.type==='trajet'?r.from+' → '+r.to:'⏸ '+r.from;
    const tb=r.type==='trajet'?'<span class="log-type-t">trajet</span>':'<span class="log-type-s">arrêt</span>';
    html+=`<div class="log-row"><div class="log-seg">${seg}</div><div>${tb}</div><div class="log-time">${fmtMs(r.ms)}</div><div class="log-cum">${fmtMs(cum)}</div></div>`;
  });
  document.getElementById('c-log').innerHTML=html;
}

/* reset */
function chronoReset(){
  clearInterval(cInt);
  cDep=null;cDir=null;cState='idle';cTs=null;cLog=[];cCum=0;
  document.getElementById('chrono-setup').style.display='';
  document.getElementById('chrono-run').style.display='none';
  document.getElementById('dir-wrap').style.display='none';
  document.querySelectorAll('#grid-dep .stn-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('dir-4c').classList.remove('sel-dir');
  document.getElementById('dir-chu').classList.remove('sel-dir');
}

init();
</script>
